            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 15px;

        }

        .links a:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
            transform: translateY(-2px);
        }

        .links a.video-call:hover {

            border-color: #10b981;
        }

        .icon {
            margin-right: 8px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
